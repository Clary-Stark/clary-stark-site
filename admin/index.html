<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clary Stark — Administration</title>
  <style>
    body {
      margin: 0;
      background: #05070f;
      font-family: 'Montserrat', sans-serif;
    }
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      background: #05070f;
      z-index: 9999;
      transition: opacity .5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-logo {
      font-family: Georgia, serif;
      font-size: 28px; font-weight: 300;
      letter-spacing: .25em; color: #fff;
    }
    .loading-logo span { color: #00c8ff; font-style: italic; }
    .loading-sub {
      font-size: 10px; letter-spacing: .35em;
      text-transform: uppercase; color: rgba(0,200,255,.5);
    }
    .loading-bar {
      width: 200px; height: 1px;
      background: rgba(0,200,255,.15); position: relative; overflow: hidden;
    }
    .loading-bar::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, #00c8ff, transparent);
      animation: slide 1.5s infinite;
    }
    @keyframes slide { to { left: 200%; } }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loading-logo">CLARY <span>STARK</span></div>
    <div class="loading-sub">Chargement du tableau de bord...</div>
    <div class="loading-bar"></div>
  </div>

  <!-- Netlify Identity Widget (obligatoire pour l'auth OAuth) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Masquer le loading une fois Decap chargé
    window.addEventListener('load', function() {
      setTimeout(function() {
        var ls = document.getElementById('loading-screen');
        if (ls) ls.classList.add('fade-out');
        setTimeout(function() { if (ls) ls.style.display = 'none'; }, 600);
      }, 1200);
    });

    // Redirection après login Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>

</body>
</html>
